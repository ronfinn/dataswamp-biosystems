schema_version: 1
roles:
  - id: programme-lead
    label: "Programme Lead"
    description: "Accountable lead for a research programme."
  - id: principal-investigator
    label: "Principal Investigator"
    description: "Scientific lead for one or more studies."
  - id: bioinformatician
    label: "Bioinformatician"
    description: "Designs and runs computational analyses."
  - id: data-engineer
    label: "Data Engineer"
    description: "Builds and operates data pipelines and storage."
  - id: platform-engineer
    label: "Platform Engineer"
    description: "Operates the underlying data platform."
  - id: data-steward
    label: "Data Steward"
    description: "Stewards data meaning, quality, and documentation."
  - id: head-of-governance
    label: "Head of Data Governance"
    description: "Leads the data governance function."
  - id: data-protection-officer
    label: "Data Protection Officer"
    description: "Oversees data protection and privacy compliance."
